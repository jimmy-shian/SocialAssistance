        }

    })();

  <link rel="preconnect" href="https://c.tile.openstreetmap.org" crossorigin>

<body>

  <div id="nav-placeholder"></div>

  <main>
    <!-- Hero Section - Dynamically rendered from siteContent.js -->
    <section class="hero-slider-asym" id="hero-slider">
      <div class="hero-slide-wrapper">
        <!-- Slides rendered by render-index.js -->
      </div>

      <div class="hero-content-asym">
        <!-- Content rendered by render-index.js -->
      </div>

      <!-- Dots (auto-generated by DOMContentLoaded script) -->
      <div class="absolute bottom-8 left-8 flex gap-2 z-20">
        <!-- Dots rendered by script -->
      </div>
    </section>

    <div class="container mx-auto relative z-10 px-8">
      <!-- Philosophy / About Section - Dynamically rendered from siteContent.js -->
      <section class="philosophy-section asym-layout mt-16 mb-16" id="about">
        <div class="philosophy-image-box">
          <!-- Image rendered by render-index.js -->
        </div>
        <div class="philosophy-content offset-border p-8 rounded-xl">
          <!-- Content rendered by render-index.js -->
        </div>
      </section>

      <!-- Services Section - Circular Grid Layout (Figure 1 style) -->
      <section class="services-circular-section py-8 px-3" id="services">
        <div class="text-center mb-8">
          <h2 class="section-title inline-block relative z-10">服務項目</h2>
        </div>

        <div class="services-circular-container max-w-5xl mx-auto" id="services-circular-grid">
          <!-- Dynamically rendered from servicesContent.js -->
        </div>
      </section>

      <script src="./js/data/servicesContent.js"></script>
      <script>
        (function () {
          function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
          }
          const container = document.querySelector('#services-circular-grid');
          const data = window.servicesContent;
          if (!container || !data || !Array.isArray(data.items)) return;

          container.innerHTML = `
            <div class="flex flex-wrap justify-center gap-y-2 gap-x-6 md:gap-x-12">
              ${data.items.map((item, idx) => `
                <a href="./services.html#service-${idx + 1}" class="service-circular-card group" style="width: 220px;">
                  <div class="circle-wrapper mx-auto">
                    ${item.image ? `<img decoding="async" src="${esc(item.image)}" alt="${esc(item.title)}" loading="lazy">` : ''}
                  </div>
                  <div class="service-circular-badge">
                    ${esc(item.title)}
                  </div>
                </a>
              `).join('')}
            </div>
          `;
        })();
      </script>

      <!-- SDGs Section - Dynamically rendered from siteContent.js -->
      <section class="sdgs-section mt-18 mb-14" id="sdgs">
        <h2>🌱 符合聯合國永續發展目標 (SDGs)</h2>
        <div class="sdgs-grid">
          <!-- Rendered dynamically by render-index.js from siteContent.js -->
        </div>
      </section>

      <!-- Team Section - Dynamic from aboutContent.js -->
      <section class="team-section" id="team">
        <h2 class="section-title">我們的團隊</h2>
        <div class="team-grid" id="team-container">
          <!-- Rendered dynamically by script below -->
        </div>
      </section>
      <script src="./js/data/aboutContent.js"></script>
      <script>
        (function () {
          const container = document.getElementById('team-container');
          if (!container || !window.aboutContent || !Array.isArray(window.aboutContent.team)) return;
          const team = window.aboutContent.team;
          container.innerHTML = team.map(t => {
            const roles = (t.roles || []).map(r => `<span class="inline-block px-2 py-0.5 rounded-full text-xl bg-[var(--primary)]/20 text-[var(--primary)] mr-1">${r}</span>`).join('');
            const motto = t.motto ? `<p class="motto italic text-xl text-gray-600 dark:text-gray-300 mt-2">"${t.motto}"</p>` : '';
            const edu = (t.education || []).map(d => `<li class="text-xl">${d}</li>`).join('');
            const exp = (t.experience || []).map(d => `<li class="text-xl">${d}</li>`).join('');
            const socials = (t.socials || []).map(s => {
              const key = String(s.name || '').toLowerCase();
              let icon = '';
              let hoverColor = 'hover:text-[var(--primary)]'; // default
              if (key === 'facebook' || key === 'fb') {
                icon = '<i class="fab fa-facebook"></i>';
                hoverColor = 'hover:text-[#1877F2]';
              }
              else if (key === 'instagram' || key === 'ig') {
                icon = '<i class="fab fa-instagram"></i>';
                hoverColor = 'hover:text-[#E4405F]';
              }
              else if (key === 'line') {
                icon = '<i class="fab fa-line"></i>';
                hoverColor = 'hover:text-[#00C300]';
              }
              else if (key === 'threads') {
                icon = '<i class="fab fa-threads"></i>';
                hoverColor = 'hover:text-black dark:hover:text-white';
              }
              else {
                icon = '<i class="fas fa-link"></i>';
              }
              return `<a href="${s.href}" target="_blank" rel="noopener" class="text-gray-500 ${hoverColor} transition-colors duration-300" onclick="event.stopPropagation()">${icon}</a>`;
            }).join(' ');
            return `
              <article class="team-card cursor-pointer" onclick="window.location.href='./about.html#team'">
                <div class="card-inner">
                  <div class="card-face front">
                    <figure class="image-frame image-frame--portrait">
                      ${t.photo ? `<img decoding="async" class="team-photo-img" src="${t.photo}" alt="${t.name || ''}" loading="lazy">` : '<div class="team-photo-placeholder"></div>'}
                    </figure>
                    <div class="team-info">
                      <div class="team-roles">${roles}</div>
                      <h4 class="team-name">${t.name || ''}</h4>
                      ${motto}
                    </div>
                  </div>
                  <div class="card-face back">
                    <div class="team-back-content">
                      <h4 class="team-name mb-2">${t.name || ''}</h4>
                      ${edu ? `<div class="mb-2"><p class="text-xl font-semibold mb-1">學歷</p><ul class="list-disc pl-4 text-gray-600 dark:text-gray-300">${edu}</ul></div>` : ''}
                      ${exp ? `<div class="mb-2"><p class="text-xl font-semibold mb-1">經歷</p><ul class="list-disc pl-4 text-gray-600 dark:text-gray-300">${exp}</ul></div>` : ''}
                      ${socials ? `<div class="team-socials flex gap-3 mt-3">${socials}</div>` : ''}
                    </div>
                  </div>
                </div>
              </article>`;
          }).join('');
        })();
      </script>

      <!-- Achievements Section -->
      <div id="achievements-placeholder" class="mb-12"></div>

      <!-- Map Section (保留原有功能) -->
      <section class="mt-5 text-center">
        <div class="flex flex-col items-center gap-2 mb-4">
          <h2 class="section-title">地區資源地圖</h2>
          <div class="flex items-center gap-2 text-sm">
            <button id="region-prev" aria-label="上一個地區"
              class="px-3 py-2 rounded-full bg-[var(--bg-surface)] border border-[var(--border)] text-[var(--text-primary)] hover:bg-[var(--primary)] hover:text-white transition-all duration-300">◀</button>
            <div id="region-ticker"
              class="min-w-[240px] px-4 py-2 rounded-full bg-[var(--bg-surface)] border border-[var(--border)] text-[var(--text-primary)]">
              載入地區中…
            </div>
            <button id="region-next" aria-label="下一個地區"
              class="px-3 py-2 rounded-full bg-[var(--bg-surface)] border border-[var(--border)] text-[var(--text-primary)] hover:bg-[var(--primary)] hover:text-white transition-all duration-300">▶</button>
          </div>
        </div>
        <div id="chiayi-map" class="w-full h-96 rounded-2xl shadow-lg border border-[var(--border)]"></div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="./js/data/siteContent.js"></script>
  <script src="./js/achievements.js"></script>
  <script src="./js/render-index.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Small delay to ensure render-index.js has run
      setTimeout(() => {
        const slides = document.querySelectorAll('.hero-slide-asym');
        if (slides.length === 0) return;

        // Generate dots if missing or mismatch
        const dotContainer = document.querySelector('.absolute.bottom-8.left-8');
        let dots = [];
        if (dotContainer) {
          dotContainer.innerHTML = ''; // clear hardcoded
          slides.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = `w-3 h-3 rounded-full ${i === 0 ? 'bg-[var(--primary)] opacity-100' : 'bg-gray-400 opacity-50'} transition-all`;
            btn.onclick = () => { stopAutoSlide(); showSlide(i); startAutoSlide(); };
            dotContainer.appendChild(btn);
            dots.push(btn);
          });
        }

        let currentSlide = 0;
        let slideInterval;

        function showSlide(index) {
          slides.forEach((slide, i) => {
            slide.classList.toggle('active', i === index);
          });
          dots.forEach((dot, i) => {
            if (i === index) {
              dot.classList.remove('bg-gray-400', 'opacity-50');
              dot.classList.add('bg-[var(--primary)]', 'opacity-100');
            } else {
              dot.classList.add('bg-gray-400', 'opacity-50');
              dot.classList.remove('bg-[var(--primary)]', 'opacity-100');
            }
          });
          currentSlide = index;
        }

        function nextSlide() {
          showSlide((currentSlide + 1) % slides.length);
        }

        function startAutoSlide() {
          if (slides.length > 1) slideInterval = setInterval(nextSlide, 5000);
        }

        function stopAutoSlide() {
          clearInterval(slideInterval);
        }

        startAutoSlide();
      }, 100);
    });
  </script>

  <script>

        var raw = localStorage.getItem(K);

        if (!v) {
          try { v = sessionStorage.getItem('asset_v'); if (!v) { v = String(Date.now()); sessionStorage.setItem('asset_v', v); } }
          catch (e) { v = String(Date.now()); }
        }
        var s = document.createElement('script'); s.src = './js/navFooter.js?v=' + encodeURIComponent(v);
        var cur = document.currentScript; (cur && cur.parentNode ? cur.parentNode : document.body).insertBefore(s, cur);
      } catch (e) { var s = document.createElement('script'); s.src = './js/navFooter.js?v=' + Date.now(); document.body.appendChild(s); }
    })();
  </script>
