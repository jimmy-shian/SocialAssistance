<!DOCTYPE html> <html lang="zh-TW" data-theme="light"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <meta http-equiv="X-UA-Compatible" content="ie=edge"> <title>問卷系統 | 社會扶助平台</title> <!-- Tailwind CSS --> <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"> <!-- 全域配置 --> <script src="./js/config.js"></script> <!-- Toast 提示 --> <script src="./js/toast.js"></script> <!-- 問卷系統 --> <script src="./js/surveys.js"></script> <!-- 全域樣式 --> <style> body { background-color: #f9fafb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; } .btn-soft { display: inline-flex; align-items: center; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; cursor: pointer; border: none; } .btn-green { background-color: #10b981; color: white; } .btn-green:hover { background-color: #059669; } .btn-purple { background-color: #8b5cf6; color: white; } .btn-purple:hover { background-color: #7c3aed; } .btn-blue { background-color: #3b82f6; color: white; } .btn-blue:hover { background-color: #2563eb; } .ui-modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 40; } .ui-modal-content { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: white; border-radius: 0.75rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); z-index: 50; width: 90%; max-width: 640px; max-height: 85vh; overflow-y: auto; } @media (prefers-color-scheme: dark) { body { background-color: #1b2229; color: #e5e7eb; } .ui-modal-content { background-color: #1f2937; } .bg-white { background-color: #1f2937 !important; } .text-gray-800 { color: #e5e7eb !important; } .text-gray-600 { color: #9ca3af !important; } .text-gray-500 { color: #6b7280 !important; } .border-gray-200 { border-color: #374151 !important; } .border-gray-100 { border-color: #1f2937 !important; } } </style> </head> <body> <!-- 導覽列 --> <nav class="fixed top-0 left-0 w-full bg-blue-700 py-3 px-4 flex justify-between items-center shadow-md z-30"> <a href="./index.html" class="text-white font-bold flex items-center hover:underline"> <span class="text-xl">🏠</span> <span class="ml-2 hidden sm:inline">社會扶助平台</span> </a> <div class="flex items-center gap-2"> <a href="./surveys.html" class="text-white bg-blue-600 px-3 py-1 rounded-md text-sm font-medium">問卷</a> <a href="./about.html" class="text-white hover:bg-blue-600 px-3 py-1 rounded-md text-sm font-medium">關於我們</a> <a href="./member.html" class="text-white hover:bg-blue-600 px-3 py-1 rounded-md text-sm font-medium">會員專區</a> </div> </nav> <!-- 頁面主要內容 --> <div class="pt-16 pb-8 px-4 max-w-4xl mx-auto"> <!-- 頁面標題 --> <div class="py-6"> <h1 class="text-2xl font-bold text-gray-800">問卷調查</h1> <p class="text-gray-500 mt-1">參與問卷，分享您的寶貴意見</p> </div> <!-- 管理員工具列（僅管理員可見） --> <div id="admin-survey-bar" class="hidden mb-6 bg-purple-50 border border-purple-200 rounded-lg p-4"> <div class="flex items-center justify-between"> <div> <h2 class="font-semibold text-purple-800">管理員功能</h2> <p class="text-sm text-purple-600">建立與管理問卷</p> </div> <button class="btn-soft btn-purple" data-create-survey> <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg> 建立新問卷 </button> </div> </div> <!-- 問卷列表 --> <div id="surveys-list"> <!-- 載入中指示器 --> </div> </div> <!-- 問卷填寫 Modal --> <div id="survey-modal" class="hidden"> <div class="ui-modal-overlay" data-close-survey></div> <div class="ui-modal-content"> <div class="sticky top-0 bg-white border-b border-gray-200 p-4 flex items-center justify-between z-10"> <h2 id="survey-title" class="text-lg font-semibold text-gray-800">填寫問卷</h2> <button class="text-gray-400 hover:text-gray-600 p-1" data-close-survey aria-label="關閉"> <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg> </button> </div> <div id="survey-content" class="p-6"> <!-- 問卷內容動態渲染 --> </div> </div> </div> <!-- 建立問卷 Modal（管理員） --> <div id="create-survey-modal" class="hidden"> <div class="ui-modal-overlay" data-close-create-survey></div> <div class="ui-modal-content"> <div class="sticky top-0 bg-white border-b border-gray-200 p-4 flex items-center justify-between z-10"> <h2 class="text-lg font-semibold text-gray-800">建立新問卷</h2> <button class="text-gray-400 hover:text-gray-600 p-1" data-close-create-survey aria-label="關閉"> <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg> </button> </div> <div class="p-6"> <!-- 問卷標題 --> <div class="mb-4"> <label class="block text-sm font-medium text-gray-700 mb-1">問卷標題 <span class="text-red-500">*</span></label> <input id="new-survey-title" type="text" class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="輸入問卷標題" required> </div> <!-- 問卷描述 --> <div class="mb-4"> <label class="block text-sm font-medium text-gray-700 mb-1">問卷描述</label> <textarea id="new-survey-description" rows="2" class="w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="簡短描述此問卷的目的"></textarea> </div> <!-- 問題列表 --> <div class="mb-4"> <div class="flex items-center justify-between mb-2"> <label class="block text-sm font-medium text-gray-700">問題列表 <span class="text-red-500">*</span></label> <button class="btn-soft btn-blue text-sm" data-add-question> <svg class="w-4 h-4 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg> 新增問題 </button> </div> <div id="new-survey-questions"> <!-- 問題動態新增 --> </div> </div> <!-- 操作按鈕 --> <div class="flex justify-end gap-3 pt-4 border-t border-gray-200"> <button class="btn-soft btn-purple" data-close-create-survey>取消</button> <button class="btn-soft btn-green" data-submit-create-survey>建立問卷</button> </div> </div> </div> </div> <!-- 深色模式切換 --> <script> const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)'); if (prefersDarkScheme && prefersDarkScheme.matches) { document.documentElement.setAttribute('data-theme', 'dark'); } </script> </body> </html>
